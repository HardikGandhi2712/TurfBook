<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="font-sans bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="relative w-full max-w-4xl h-auto bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row">

        <div class="hidden md:block absolute w-full aspect-square rounded-full bg-gradient-to-br from-blue-700 via-blue-500 to-blue-400 translate-x-1/2 -translate-y-1/4 right-0 z-0"></div>

        <div class="w-full md:w-1/2 p-10 md:p-12 flex flex-col justify-center relative z-10">
            <h2 class="text-3xl text-gray-800 text-center mb-6 font-semibold">Register</h2>
            
            <div id="generalError" class="hidden w-full p-3 mb-4 text-sm text-red-600 bg-red-50 rounded-lg text-center font-medium"></div>

            <form id="registerForm" method="post" action="/register" novalidate>
                
                <div class="mb-5">
                    <div class="relative w-full h-14">
                        <input type="text" name="name" id="name" required
                            class="peer w-full h-full bg-transparent border-b-2 border-gray-300 outline-none text-gray-800 text-base font-medium pr-10 transition-colors focus:border-blue-600">
                        <label 
                            class="absolute left-0 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none transition-all duration-300 peer-focus:-top-2 peer-focus:text-sm peer-focus:text-blue-600 peer-valid:-top-2 peer-valid:text-sm peer-valid:text-blue-600">
                            Name <span class="text-red-500">*</span>
                        </label>
                        <i class="fa-solid fa-user absolute right-2 top-1/2 -translate-y-1/2 text-lg text-gray-400 transition-colors duration-300 peer-focus:text-blue-600 peer-valid:text-blue-600"></i>
                    </div>
                    <p id="nameError" class="text-red-500 text-xs mt-1 hidden"></p>
                </div>

                <div class="mb-5">
                    <div class="relative w-full h-14">
                        <input type="text" name="username" id="username" required
                            class="peer w-full h-full bg-transparent border-b-2 border-gray-300 outline-none text-gray-800 text-base font-medium pr-10 transition-colors focus:border-blue-600">
                        <label 
                            class="absolute left-0 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none transition-all duration-300 peer-focus:-top-2 peer-focus:text-sm peer-focus:text-blue-600 peer-valid:-top-2 peer-valid:text-sm peer-valid:text-blue-600">
                            Username <span class="text-red-500">*</span>
                        </label>
                        <i class="fa-solid fa-user absolute right-2 top-1/2 -translate-y-1/2 text-lg text-gray-400 transition-colors duration-300 peer-focus:text-blue-600 peer-valid:text-blue-600"></i>
                    </div>
                    <p id="usernameError" class="text-red-500 text-xs mt-1 hidden"></p>
                </div>

                <div class="mb-5">
                    <div class="relative w-full h-14">
                        <input type="password" name="password" id="password" required
                            class="peer w-full h-full bg-transparent border-b-2 border-gray-300 outline-none text-gray-800 text-base font-medium pr-10 transition-colors focus:border-blue-600">
                        <label 
                            class="absolute left-0 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none transition-all duration-300 peer-focus:-top-2 peer-focus:text-sm peer-focus:text-blue-600 peer-valid:-top-2 peer-valid:text-sm peer-valid:text-blue-600">
                            Password <span class="text-red-500">*</span>
                        </label>
                        <i class="fa-solid fa-lock absolute right-2 top-1/2 -translate-y-1/2 text-lg text-gray-400 transition-colors duration-300 peer-focus:text-blue-600 peer-valid:text-blue-600"></i>
                    </div>
                    <p id="passwordError" class="text-red-500 text-xs mt-1 hidden"></p>
                </div>

                <div class="mb-5">
                    <div class="relative w-full h-14">
                        <input type="email" name="email" id="email" required
                            class="peer w-full h-full bg-transparent border-b-2 border-gray-300 outline-none text-gray-800 text-base font-medium pr-10 transition-colors focus:border-blue-600">
                        <label 
                            class="absolute left-0 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none transition-all duration-300 peer-focus:-top-2 peer-focus:text-sm peer-focus:text-blue-600 peer-valid:-top-2 peer-valid:text-sm peer-valid:text-blue-600">
                            Email <span class="text-red-500">*</span>
                        </label>
                        <i class="fa-solid fa-envelope absolute right-2 top-1/2 -translate-y-1/2 text-lg text-gray-400 transition-colors duration-300 peer-focus:text-blue-600 peer-valid:text-blue-600"></i>
                    </div>
                    <p id="emailError" class="text-red-500 text-xs mt-1 hidden"></p>
                </div>
                
                <div class="mt-4 mb-6">
                    <label class="block mb-3 font-medium text-gray-700">Profile Picture <span class="text-red-500">*</span></label>
                    
                    <div id="dropZone" class="flex flex-col items-center justify-center p-6 border-2 border-dashed border-gray-300 rounded-xl cursor-pointer transition-colors duration-300 hover:border-blue-600 hover:bg-blue-50">
                        <input type="file" id="avatar" accept="image/*" hidden>
                        
                        <i class="fa-solid fa-cloud-arrow-up text-4xl text-blue-600 mb-3" id="uploadIcon"></i>
                        
                        <p class="font-medium text-gray-700" id="uploadText">Drag & Drop your image here</p>
                        <span class="text-sm text-gray-500 mt-1" id="uploadSubText">or click to browse</span>
                        
                        <img id="previewAvatar" class="hidden mt-4 w-28 h-28 rounded-full object-cover border-4 border-blue-600" alt="Preview">
                    </div>
                    <p id="avatarError" class="text-red-500 text-xs mt-1 hidden"></p>
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full h-12 mt-2 bg-blue-600 text-white rounded-lg text-lg font-semibold transition-all duration-300 hover:bg-blue-700 hover:-translate-y-1 hover:shadow-lg">
                    Register
                </button>

                <div class="text-center mt-6 text-gray-500 text-sm">
                    <p>Already Registered? <a href="login.html" class="text-blue-600 font-semibold hover:underline">Login</a></p>
                </div>
            </form>
        </div>

        <div class="w-full md:w-1/2 px-10 py-12 md:px-14 flex flex-col justify-center items-center text-center text-white relative z-10 bg-gradient-to-br from-blue-600 to-blue-500 md:bg-none md:bg-transparent">
            <h2 class="text-4xl font-bold mb-4 leading-tight uppercase">Join PlayOn Today</h2>
            <p class="text-lg leading-relaxed text-blue-50">
                Join us to get play the sports you love
            </p>
        </div>

    </div>

    <script src="register.js"></script>
</body>
</html>
