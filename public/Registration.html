<html>
    <head>
        <title>Register</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
 @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Poppins",sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#f3f4f6;
    padding:20px;
}

.container{
    position:relative;
    width:900px;
    height:750px;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
}

.container .form-box{
    position:absolute;
    left:0;
    top:0;
    width:50%;
    height:100%;
    display:flex;
    justify-content:center;
    flex-direction:column;
    padding:40px 50px;
    z-index:2;
}

.form-box.Register{
    left:0;
}

.form-box h2{
    font-size:34px;
    text-align:center;
    color:#1f2937;
    margin-bottom:10px;
}

.form-box form{
    width:100%;
}

.form-box .input-box{
    position:relative;
    width:100%;
    height:55px;
    margin:22px 0;
}

.input-box input{
    width:100%;
    height:100%;
    background:transparent;
    border:none;
    outline:none;
    border-bottom:2px solid #d1d5db;
    font-size:16px;
    color:#1f2937;
    font-weight:500;
    padding-right:35px;
    transition:.3s;
}

.input-box input:focus,
.input-box input:valid{
    border-bottom:2px solid #2563eb;
}

.input-box label{
    position:absolute;
    left:0;
    top:50%;
    transform:translateY(-50%);
    font-size:16px;
    color:#6b7280;
    pointer-events:none;
    transition:.3s;
}

.input-box input:focus~label,
.input-box input:valid~label{
    top:-8px;
    color:#2563eb;
    font-size:14px;
}

.input-box i{
    position:absolute;
    top:50%;
    right:5px;
    transform:translateY(-50%);
    font-size:20px;
    color:#9ca3af;
    transition:.3s;
}

.input-box input:focus~i,
.input-box input:valid~i{
    color:#2563eb;
}

.btn{
    width:100%;
    height:48px;
    border:none;
    outline:none;
    border-radius:10px;
    background:#2563eb;
    color:#fff;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
    margin-top:10px;
}

.btn:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(37,99,235,.35);
}

.regi-link{
    text-align:center;
    margin-top:25px;
    color:#6b7280;
    font-size:15px;
}

.regi-link p{
    color:#6b7280;
}

.regi-link a{
    color:#2563eb;
    text-decoration:none;
    font-weight:600;
}

.regi-link a:hover{
    text-decoration:underline;
}

.info-content{
    position:absolute;
    top:0;
    right:0;
    width:50%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:0 60px;
    z-index:2;
}

.info-content.Register{
    right:0;
}

.info-content h2{
    font-size:42px;
    color:#fff;
    margin-bottom:20px;
    text-transform:uppercase;
    line-height:1.3;
}

.info-content p{
    color:#eef4ff;
    font-size:17px;
    line-height:1.7;
}

.container .curved-shape{
    position:absolute;
    right:-220px;
    top:-120px;
    width:720px;
    height:720px;
    background:linear-gradient(135deg,#2563eb,#3b82f6,#60a5fa);
    border-radius:50%;
}

.input-box input::placeholder{
    color:#9ca3af;
}

@media(max-width:900px){

    .container{
        width:100%;
        max-width:450px;
        height:auto;
        display:flex;
        flex-direction:column;
    }

    .container .form-box{
        position:relative;
        width:100%;
        height:auto;
        padding:40px 30px;
    }

    .info-content{
        position:relative;
        width:100%;
        padding:40px 30px;
        background:linear-gradient(135deg,#2563eb,#3b82f6);
    }

    .container .curved-shape{
        display:none;
    }

    .info-content h2{
        font-size:30px;
    }

    .info-content p{
        font-size:15px;
    }
}

.upload-box{
    margin-top:15px;
}

.upload-label{
    display:block;
    margin-bottom:10px;
    font-weight:500;
    color:#374151;
}

.drop-zone{
    border:2px dashed #d1d5db;
    border-radius:12px;
    padding:25px;
    text-align:center;
    cursor:pointer;
    transition:.3s;
}

.drop-zone:hover{
    border-color:#2563eb;
    background:#eff6ff;
}

.drop-zone.drag-over{
    border-color:#2563eb;
    background:#dbeafe;
}

.drop-zone i{
    font-size:42px;
    color:#2563eb;
    margin-bottom:10px;
}

.drop-zone p{
    font-weight:500;
    color:#374151;
}

.drop-zone span{
    color:#6b7280;
    font-size:14px;
}

#previewAvatar{
    margin-top:15px;
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #2563eb;
}

.hidden{
    display:none;
}
        </style>
    </head>
    <body>
        <div class="container">
            <div class="curved-shape"></div>
            <div class="form-box Register">
                <h2>Register</h2>
                <form id = "registerForm" method='post' action="/register">
                    <div class="input-box">
                        <input type='text' name='name' id = "name" required>
                        <label for="">Name</label>
                        <i class="bx bxs-user"></i>
                    </div>  

                    <div class="input-box">
                        <input type='text' name='username' id = "username" required>
                        <label for="">Username</label>
                        <i class="bx bxs-user"></i>
                    </div>  

                    <div class="input-box">
                        <input type='password' name='password' id = "password" required>
                        <label for="">Password</label>
                        <i class='bx bxs-lock-alt'></i>
                    </div>

                    <div class="input-box">
                        <input type='text' name='email' id = "email" required>
                        <label for="">Email</label>
                        <i class='bx bxs-lock-alt'></i>
                    </div>
                    
                    <div class="upload-box">
                    <label class="upload-label">Profile Picture</label>

                    <div id="dropZone" class="drop-zone">
                        <input type="file" id="avatar" accept="image/*" hidden>

                        <i class='bx bx-cloud-upload'></i>

                        <p>Drag & Drop your image here</p>
                        <span>or click to browse</span>
                        <input type="hidden" id="avatarData">
                        <img id="previewAvatar" class="hidden" alt="Preview">
                    </div>
                 </div>
                    <div class="input-box">
                        <button class="btn" type="submit">Register</button>
                    </div>

                    <div class="regi-link">
                        <p>Already Registered? <a href='login.html'>Login</a></p>
                    </div>
                </form>
            </div>
            <div class="info-content Register">
                <h2>Join PlayOn Today</h2>
                <p>Join us to get play the sports you love</p>
            </div>
        </div>
        <script src="register.js"></script>
    </body>
</html>
